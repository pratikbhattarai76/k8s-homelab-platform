# https://github.com/immich-app/immich-charts

immich:
  persistence:
    library:
      existingClaim: immich-library-pvc

controllers:
  main:
    containers:
      main:
        env:
          DB_HOSTNAME: immich-postgres-rw
          DB_USERNAME: immich
          DB_DATABASE_NAME: immich
          DB_PASSWORD: immich
          DB_VECTOR_EXTENSION: vectorchord

persistence:
  external-library:
    enabled: true
    type: hostPath
    hostPath: /mnt/storage/Photos/Pictures
    globalMounts:
      - path: /external

server:
  ingress:
    main:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: photos.pratik-labs.xyz
          paths:
            - path: /
              service:
                identifier: main

machine-learning:
  controllers:
    main:
      pod:
        runtimeClassName: nvidia
      containers:
        main:
          image:
            tag: v2.6.3-cuda
          resources:
            limits:
              nvidia.com/gpu: 1

valkey:
  enabled: true
