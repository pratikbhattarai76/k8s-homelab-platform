apiVersion: networking.k8s.io/v1 # Ingress lives in networking.k8s.io/v1 API group
kind: Ingress #Creating an Ingress resource
metadata:
  name: demo # Name of this Ingress
  namespace: apps
  annotations:
    traefik.ingress.kuberetes.io/router.entrypoints: web # Use Trafeik's web entrypoint 
spec:
  rules:
    - host: demo.local # When someone visits this domain, apply these rules
      http:
        paths:
          - path: / # Match all paths 
            pathType: Prefix # Prefix means match / and everything after it
            backend:
              service:
                name: demo # Forward to this service
                port:
                  number: 8080 # The service port
