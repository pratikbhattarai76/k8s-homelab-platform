- name: Base server setup
  hosts: control_plane
  become: true

  tasks:
      # This updates the packages and upgrades them too
    - name: Update and upgrade packages
      apt:
        update_cache: true
        upgrade: dist # here dist means distribution upgrade. It upgrades all packagees including ones that require adding or removing dependencies to complete the upgrade.

    - name: Set timezone
      timezone:
        name: Asia/Kathmandu

    - name: Install basic dependencies
      apt:
        name:
          - curl
          - git
          - wget
          - apt-transport-https
        state: present

    - name: Create storage mount point
      file:
        path: /mnt/storage
        state: directory

    - name: Mount HDD storage
      mount:
        path: /mnt/storage
        src: UUID=4250e634-f248-4591-b2b0-6d12919f6c8e
        fstype: ext4
        opts: defaults
        state: mounted

    - name: Set storage ownership
      file:
        path: /mnt/storage
        owner: pratikserver
        group: pratikserver
        recurse: true
        state: directory
